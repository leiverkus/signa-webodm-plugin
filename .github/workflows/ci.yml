name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: bash syntax check
        run: bash -n build-plugin.sh

      - name: shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: '.'

  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.9 is what WebODM's webapp/worker run (signa-core targets >=3.9);
        # 3.10 is the local/dev floor. Test both so neither can silently drift.
        python-version: ['3.9', '3.10']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile-check plugin + script + core sources
        run: python -m compileall -q signa scripts signa-core/signa_core

      - name: Validate manifest.json
        run: python3 -c "import json; m=json.load(open('signa/manifest.json')); assert m['name'] and m['version']; print('manifest ok:', m['name'], m['version'])"

      - name: Install test deps
        run: |
          pip install "numpy>=1.23,<3" "opencv-contrib-python-headless==4.10.0.84" pytest
          pip install -e signa-core   # plugin's params.py/marker_pdf.py import signa_core

      - name: Run unit + real-OpenCV integration tests (plugin + core)
        run: python -m pytest tests/ signa-core/tests -q

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Test plugin build
        run: |
          chmod +x build-plugin.sh
          ./build-plugin.sh

      - name: Upload zip artifact
        uses: actions/upload-artifact@v7
        with:
          name: signa-plugin-zip
          path: dist/signa-*.zip
