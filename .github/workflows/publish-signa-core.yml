# Publish the signa-core package to PyPI via Trusted Publishing (OIDC).
#
# No API token is stored anywhere: PyPI trusts this repository + workflow via
# OpenID Connect. One-time setup on pypi.org (Account → Publishing → Add a
# pending publisher), with:
#   PyPI project name:  signa-core
#   Owner:              leiverkus
#   Repository name:    signa-webodm-plugin
#   Workflow filename:  publish-signa-core.yml
#   Environment name:   pypi
#
# Release: bump the version in signa-core/pyproject.toml, then push a tag
#   git tag signa-core-v0.1.0 && git push origin signa-core-v0.1.0
name: publish-signa-core

on:
  push:
    tags:
      - "signa-core-v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Guard — tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF_NAME#signa-core-v}"
          VER="$(python -c "import tomllib;print(tomllib.load(open('signa-core/pyproject.toml','rb'))['project']['version'])")"
          echo "tag=$TAG version=$VER"
          test "$TAG" = "$VER" || { echo "::error::tag ($TAG) != pyproject version ($VER)"; exit 1; }

      - name: Run signa-core tests
        run: |
          python -m pip install --upgrade pip
          pip install -e signa-core pytest
          pytest signa-core/tests -q

      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build
        working-directory: signa-core

      - uses: actions/upload-artifact@v7
        with:
          name: signa-core-dist
          path: signa-core/dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/signa-core
    permissions:
      id-token: write   # OIDC token for PyPI Trusted Publishing
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: signa-core-dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
