name: release

# Tag a version (e.g. v1.0.0) to build the plugin .zip and publish a GitHub
# Release with the archive attached. The tag should match manifest.json version.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify tag matches manifest version
        run: |
          MANIFEST_VERSION="$(python3 -c 'import json;print(json.load(open("signa/manifest.json"))["version"])')"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "manifest=$MANIFEST_VERSION tag=$TAG_VERSION"
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match manifest version $MANIFEST_VERSION"
            exit 1
          fi

      - name: Build plugin zip
        run: |
          chmod +x build-plugin.sh
          ./build-plugin.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/signa-*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
